name: CI

on:
  push:
    branches: [main, "feat/**"]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: ragchatbot
          POSTGRES_USER: raguser
          POSTGRES_PASSWORD: ragpassword
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Cache sentence-transformers model
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: ${{ runner.os }}-hf-all-MiniLM-L6-v2

      - name: Install system dependencies
        run: sudo apt-get install -y libmupdf-dev

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Pre-download sentence-transformers model
        run: python -c "from sentence_transformers import SentenceTransformer; SentenceTransformer('all-MiniLM-L6-v2')"

      - name: Run migrations
        env:
          SECRET_KEY: ci-only-secret-key-not-for-production
          DATABASE_URL: postgres://raguser:ragpassword@localhost:5432/ragchatbot
          REDIS_URL: redis://localhost:6379/0
          CHROMA_PERSIST_DIRECTORY: /tmp/chroma_ci
          ANTHROPIC_API_KEY: sk-ant-placeholder
          DJANGO_SETTINGS_MODULE: config.settings.development
          ALLOWED_HOSTS: localhost,127.0.0.1
        run: python manage.py migrate --noinput

      - name: Run tests with coverage
        env:
          SECRET_KEY: ci-only-secret-key-not-for-production
          DATABASE_URL: postgres://raguser:ragpassword@localhost:5432/ragchatbot
          REDIS_URL: redis://localhost:6379/0
          CHROMA_PERSIST_DIRECTORY: /tmp/chroma_ci
          ANTHROPIC_API_KEY: sk-ant-placeholder
          DJANGO_SETTINGS_MODULE: config.settings.development
          ALLOWED_HOSTS: localhost,127.0.0.1
        run: |
          pytest \
            --cov=apps \
            --cov=config \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=80 \
            -q

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage.xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: always()
        with:
          file: ./coverage.xml
          fail_ci_if_error: false
